version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: voicesarkar
      POSTGRES_PASSWORD: voicesarkar
      POSTGRES_DB: voicesarkar
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    env_file: .env
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

volumes:
  pgdata:
